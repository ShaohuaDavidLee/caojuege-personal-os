<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>韶華列傳</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100vh}
body{background:#888;display:flex;align-items:center;justify-content:center;padding:24px;font-family:"Songti SC","STSong","SimSun","Noto Serif CJK SC",Georgia,serif}
.card{width:1080px;height:1080px;background:#e5e5e5;color:#1a1a1a;position:relative;overflow:hidden;flex-shrink:0}
@media (max-height:1140px){.card{transform:scale(.82);transform-origin:center center}}
@media (max-height:940px){.card{transform:scale(.7)}}
.watermark{position:absolute;right:-60px;top:30px;font-size:540px;font-weight:700;color:rgba(0,0,0,.05);line-height:.9;user-select:none;pointer-events:none;letter-spacing:-.04em}
.kicker-bar{display:flex;justify-content:space-between;align-items:center;padding:48px 80px 0;position:relative;z-index:1}
.chips{display:flex;gap:8px}
.chip{display:inline-flex;align-items:center;padding:6px 13px;border:1px solid rgba(71,73,75,.3);font-size:13px;letter-spacing:.06em;font-family:-apple-system,sans-serif}
.right-kicker{font-size:12px;color:#5c5e60;letter-spacing:.22em;font-family:-apple-system,sans-serif}
.headline{padding:18px 80px 0;position:relative;z-index:1}
h1{font-size:96px;font-weight:700;line-height:1;letter-spacing:.02em}
.quote{font-size:23px;color:#47494b;font-style:italic;margin-top:16px}
.underline{width:88px;height:2px;background:#47494b;margin-top:8px}
.body-text{padding:24px 80px 0;font-size:24px;line-height:1.72;max-width:820px;letter-spacing:.03em}
.body-text p{margin-bottom:14px}
.body-text p:last-child{margin-bottom:0}
.dark-block{margin:18px 80px 0;padding:22px 30px;background:#47494b;color:#e5e5e5;position:relative}
.dark-block .label{font-size:14px;letter-spacing:.22em;color:rgba(229,229,229,.6);margin-bottom:12px}
.dark-block .lines{font-size:20px;line-height:1.55}
.dark-block .qm{position:absolute;right:18px;top:-42px;font-size:190px;color:rgba(255,255,255,.08);font-family:Georgia,serif;line-height:1}
.seal{position:absolute;top:140px;right:80px;width:124px;height:124px;background:#b22222;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;z-index:2;box-shadow:inset 0 0 0 4px rgba(255,255,255,.18)}
.seal span{color:#fff;display:flex;align-items:center;justify-content:center;font-size:38px;font-weight:900;font-family:"Heiti SC","PingFang SC","Noto Sans CJK SC",sans-serif}
.footer{position:absolute;bottom:46px;left:80px;right:80px;display:flex;justify-content:space-between;align-items:flex-end}
.url{font-size:17px;color:#1a1a1a}
.sub{font-size:13px;color:#5c5e60;margin-top:5px;letter-spacing:.08em;font-family:-apple-system,sans-serif}
.qr{width:100px;height:100px;background:#fff;padding:4px}
.qr img{width:100%;height:100%;display:block}
.warn{background:#fff5e0;border-left:3px solid #b27e3e;padding:8px 16px;margin:12px 80px 0;font-size:12px;color:#6b4a2c;font-family:-apple-system,sans-serif;letter-spacing:.04em}
</style>
</head>
<body>
<div class="card">
<div class="watermark">列</div>
<div class="kicker-bar">
  <div class="chips">
    <span class="chip">一 · 創作者</span>
    <span class="chip">二 · 主理人</span>
    <span class="chip">三 · 陪跑教練</span>
  </div>
  <span class="right-kicker">PERSONAL ANNAL · 列 傳</span>
</div>
<div class="headline">
  <h1>韶華列傳</h1>
  <div class="quote">「以产品为笔，和世界对话」</div>
  <div class="underline"></div>
</div>
<div class="body-text">
  <p>韶华者，华夏人也。少习语言之事，后与人共立 LanguageX，治机器翻译。逢 AI 之兴，去其执事，自结草诀歌 AI 之社，聚非技之士，授以 AI 为笔，造作品而不逐风。</p>
  <p>其所求者，小而久、精而有味、能沉之为作；不务速、不抢先、不逐热。</p>
</div>
<div class="dark-block">
  <div class="qm">"</div>
  <div class="label">太 史 公 曰 ——</div>
  <div class="lines">作品者，人之留痕也。以三五人之力刻一物者，胜以千人之众逐一时。</div>
</div>
<div class="seal">
  <span>司</span><span>馬</span><span>遷</span><span>撰</span>
</div>
<div class="footer">
  <div>
    <div class="url">simaqian.caojuege.com</div>
    <div class="sub">司馬遷.skill · v0.1 · 扫码访问</div>
  </div>
  <div class="qr"><img src="https://api.qrserver.com/v1/create-qr-code/?data=https%3A%2F%2Fsimaqian.caojuege.com&size=120x120&margin=0" alt=""/></div>
</div>
</div>
</body>
</html>
