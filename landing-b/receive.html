<section class="recv">

    <div class="recv-grid">
      <aside class="stage-frame"><canvas id="card" class="vcard" width="2160" height="2880" aria-label="收到的太史判词"></canvas></aside>
      <div>
        <div class="eyebrow">Personal Annal · 你收到一句判词</div>

        <div class="cta-stack" style="max-width:360px">

<script src="./verdict-card.js"></script>
<script>
(function(){
  var p=new URLSearchParams(location.search);
  var name=p.get('name')||'你', b1=p.get('b1')||'在吗？（然后消失俩小时）', b2=p.get('b2')||'嘴上说要戒手机，朋友圈半夜三点还在线';
  var off=parseInt(p.get('t')||'3',10)||0;
  var c=document.getElementById('card');
  var d=VerdictCard.buildData({name:name,b1:b1,b2:b2,off:off,variant:'a'});
  function go(){VerdictCard.draw(c,d);}
  go(); VerdictCard.ensureFonts().then(go);
  // 回敬带上对象名
  document.getElementById('revenge').setAttribute('href','./create.html?from='+encodeURIComponent(VerdictCard.clean(name)));
})();
</script>
