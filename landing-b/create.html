<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>给朋友定一句 · 太史判词</title>
<meta name="robots" content="noindex" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Serif+SC:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./app.css">
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="lockup"><a href="./index.html" class="mark">司马迁<span class="dot">.skill</span></a><span class="tag">太史判词</span></div>
    <a class="nav-back" href="https://www.caojuege.com/" target="_blank" rel="noopener">
      <svg class="ico" viewBox="0 0 24 24"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
      草诀歌 AI Labs
    </a>
  </div>
</nav>

<section class="hero" style="padding-bottom:30px">
  <div class="hero-wm">判詞</div>
  <div class="container">
    <div class="eyebrow">Personal Annal · 太史判词</div>
    <h1 style="margin-bottom:10px">给朋友定<em>一句判词</em>。</h1>
    <p class="lead" style="margin-bottom:0">填两栏，点「换一句」让太史公落笔。损得越具体，TA 越想转发。</p>
  </div>
</section>

<div class="flow">
  <div class="container">
    <div class="recall" id="recall"></div>
    <div class="flow-grid">
      <section class="controls">
        <p class="hook">你越具体，TA 越想转发；你越客套，它越像年会颁奖词。</p>
        <div class="dice-row">
          <button class="btn ghost" id="dice" type="button">没头绪？随机抽一组</button>
          <span class="dice-hint">点示例就能填，改两个字更像 TA</span>
        </div>

        <div class="field">
          <div class="label-row"><span class="label">你正在为谁定判词</span><span class="hint">写 TA 愿意被这样叫的名字</span></div>
          <input id="name" value="老周" maxlength="8" autocomplete="off" style="max-width:240px" />
        </div>

        <div class="field">
          <div class="label-row"><span class="label">TA 最让你受不了的口头禅</span><span class="hint">越具体越好</span></div>
          <input id="b1" value="在吗？（然后消失俩小时）" autocomplete="off" />
          <div class="chips" id="chips-b1"></div>
        </div>

        <div class="field">
          <div class="label-row"><span class="label">TA 最可爱的反差 / 隐藏 bug</span><span class="hint">当面也能说的那种</span></div>
          <textarea id="b2">嘴上说要戒手机，朋友圈半夜三点还在线</textarea>
          <div class="chips" id="chips-b2"></div>
        </div>

        <div class="field">
          <span class="ctl-label">卡片底色</span>
          <div class="swatch" id="swatch">
            <button data-v="a" class="on" type="button" title="灰底·正典"></button>
            <button data-v="b" type="button" title="白纸·判书"></button>
            <button data-v="c" type="button" title="黑底·夜判"></button>
          </div>
        </div>
      </section>

      <aside class="stage">
        <div class="stage-frame"><canvas id="card" class="vcard" width="2160" height="2880" aria-label="太史判词预览"></canvas></div>
        <div class="cta-stack">
          <button class="btn" id="reroll">有请太史公·换一句</button>
          <button class="btn" id="download">保存图片</button>
          <button class="btn ghost" id="copyMsg">复制「甩给 TA」群消息</button>
        </div>
        <div class="savehint"><b>长按图片</b>也能存到相册</div>
      </aside>
    </div>
  </div>
</div>

<footer class="foot">
  <div class="container">
    <div class="foot-inner"><span>司马迁.skill · 太史判词</span><span>s.caojuege.com</span></div>
  </div>
</footer>
<div class="toast" id="toast"></div>

<script src="./verdict-card.js"></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var val=function(id){return $(id).value;};
  var toastEl=$('toast');
  function toast(m,ms){toastEl.textContent=m;toastEl.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){toastEl.classList.remove('show');},ms||2800);}

  var variant='a', off=0, aiLines=[], aiIdx=0, aiKey='', shownLine='';
  function inputsKey(){return val('name')+'|'+val('b1')+'|'+val('b2');}
  function aiActive(){return aiKey===inputsKey() && aiLines.length>0 && aiIdx<aiLines.length;}
  function redraw(){
    var line = aiActive()? aiLines[aiIdx] : null;
    var d = VerdictCard.buildData({name:val('name'),b1:val('b1'),b2:val('b2'),off:off,line:line,variant:variant});
    VerdictCard.draw($('card'), d); shownLine=d.line;
  }

  // 输入：清掉 AI 缓存，回到模板实时预览
  ['name','b1','b2'].forEach(function(id){$(id).addEventListener('input',function(){ aiLines=[]; redraw(); clearChipSel(id); });});

  // 底色 swatch
  $('swatch').addEventListener('click',function(e){
    var b=e.target.closest('button'); if(!b) return;
    [].forEach.call(this.children,function(c){c.classList.remove('on');});
    b.classList.add('on'); variant=b.getAttribute('data-v'); redraw();
  });

  // 换一句：AI 一次返回3句，先本地切，切完再调；失败回退模板
  var gen=$('reroll');
  gen.addEventListener('click',function(){
    if(aiActive() && aiIdx < aiLines.length-1){ aiIdx++; redraw(); return; }
    var label=gen.textContent; gen.disabled=true; gen.textContent='太史公落笔中…';
    fetch('/api/verdict',{method:'POST',headers:{'content-type':'application/json'},body:JSON.stringify({name:val('name'),b1:val('b1'),b2:val('b2')})})
      .then(function(r){return r.json();})
      .then(function(j){
        var ls=(j&&j.lines)||(j&&j.line?[j.line]:null);
        if(!ls||!ls.length) throw new Error(j&&j.error||'no_line');
        aiLines=ls; aiIdx=0; aiKey=inputsKey(); redraw();
      })
      .catch(function(){ off++; aiLines=[]; redraw(); toast('太史公一时走神，先用模板写一句（接上 DeepSeek 后即真）。'); })
      .finally(function(){ gen.disabled=false; gen.textContent=label; });
  });

  $('download').addEventListener('click',function(){ VerdictCard.download($('card'),'taishi-'+(VerdictCard.clean(val('name'))||'verdict')+'.png'); });

  function recallURL(){ return location.origin+location.pathname+'?from='+encodeURIComponent(VerdictCard.clean(val('name'))||'某君'); }
  function copy(text,ok){ if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(text).then(function(){toast(ok);}).catch(function(){toast('复制失败，请手动选择');}); } else { var t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); try{document.execCommand('copy');toast(ok);}catch(e){toast('复制失败，请手动选择');} t.remove(); } }
  $('copyMsg').addEventListener('click',function(){
    var who=VerdictCard.clean(val('name'))||'TA';
    var msg='@'+who+' 太史公给你下了判词：\n「'+shownLine+'」\n不服？扫码回敬我一张 👉 '+recallURL();
    copy(msg,'已复制群消息，去群里 @TA');
  });

  // 示例气泡（点选=黑底，并填入字段）
  var CHIPS_B1=['在吗','等我五分钟','这事我熟','下次一定','我马上到','不熬夜了','随便都行'];
  var CHIPS_B2=['嘴上躺平，加班最狠','说要减肥，半夜点外卖','天天哭穷，又总抢着买单','喊着断舍离，购物车堆成山','说不熬夜，三点还在刷手机','朋友圈很佛，抢红包最快'];
  var PRESETS=[{name:'老周',b1:'等我五分钟',b2:'每次都迟到，还总怪路上堵'},{name:'阿强',b1:'这事我熟',b2:'吹得最响，干得最少'},{name:'室友',b1:'随便吃点',b2:'说随便，又把每家都嫌一遍'},{name:'老板',b1:'马上就好',b2:'说马上，让人等到天荒地老'},{name:'我妈',b1:'我没事',b2:'嘴上没事，电话里能念叨半小时'},{name:'老王',b1:'下次一定',b2:'答应的事永远在下次，从没下次'}];
  function clearChipSel(targetId){ var box=$('chips-'+targetId); if(box) [].forEach.call(box.children,function(c){c.classList.remove('on');}); }
  function chips(boxId,list,targetId){
    var box=$(boxId); if(!box) return;
    list.forEach(function(t){
      var b=document.createElement('button'); b.type='button'; b.className='chip'; b.textContent=t;
      b.addEventListener('click',function(){
        [].forEach.call(box.children,function(c){c.classList.remove('on');}); b.classList.add('on');
        $(targetId).value=t; aiLines=[]; redraw();
      });
      box.appendChild(b);
    });
  }
  chips('chips-b1',CHIPS_B1,'b1'); chips('chips-b2',CHIPS_B2,'b2');
  $('dice').addEventListener('click',function(){
    var p=PRESETS[Math.floor(Math.random()*PRESETS.length)];
    $('name').value=p.name; $('b1').value=p.b1; $('b2').value=p.b2;
    off=0; aiLines=[]; clearChipSel('b1'); clearChipSel('b2'); redraw();
    toast('抽了一组，点「换一句」让太史公落笔。');
  });

  // 回敬入口：?from=X
  (function(){
    var from=new URLSearchParams(location.search).get('from');
    if(from){ var r=$('recall'); r.classList.add('on'); r.innerHTML='<b>「'+VerdictCard.clean(from).replace(/[<>&]/g,'')+'」</b> 刚判了你一句——轮到你回敬了。下面填两条，给 TA 也下一判。'; }
  })();

  redraw(); VerdictCard.ensureFonts().then(redraw);
})();
</script>
</body>
</html>
