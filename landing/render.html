<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>渲染器 · 司马迁.skill</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#e5e5e5;--ink:#1a1a1a;--dark:#47494b;--muted:#5c5e60;
  --border:rgba(71,73,75,.2);--seal:#b22222;
  --font-serif:"Noto Serif CJK SC","Songti SC","STSong","SimSun",Georgia,serif;
  --font-sans:-apple-system,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
}
body{background:var(--bg);color:var(--ink);font-family:var(--font-sans);line-height:1.6;font-size:15px;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}
.wrap{max-width:1240px;margin:0 auto;padding:0 24px;width:100%}

.nav{padding:24px 0;border-bottom:1px solid var(--border)}
.nav-inner{display:flex;justify-content:space-between;align-items:center}
.brand{font-family:var(--font-serif);font-weight:700;font-size:17px;letter-spacing:.12em;display:flex;align-items:center;gap:10px}
.brand .dot{width:8px;height:8px;background:var(--seal);display:inline-block}
.back{font-size:13px;color:var(--muted);letter-spacing:.04em}
.back:hover{color:var(--ink)}

.head{padding:40px 0 18px}
.eyebrow{font-size:11px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase;margin-bottom:14px}
h1{font-family:var(--font-serif);font-weight:700;font-size:30px;letter-spacing:-.01em;margin-bottom:10px}
.lead{font-size:15px;color:var(--muted);max-width:54ch}

.layout{flex:1;display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1.15fr);gap:28px;padding:24px 0 60px}
@media(max-width:980px){.layout{grid-template-columns:1fr;gap:24px}}

.col{display:flex;flex-direction:column;gap:12px;min-width:0}
.col h2{font-family:var(--font-serif);font-size:13px;font-weight:600;letter-spacing:.18em;color:var(--muted);text-transform:uppercase}

/* Textarea */
.input-wrap{background:var(--dark);position:relative;flex:1;display:flex;flex-direction:column;min-height:560px}
.input-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.08);font-size:11px;letter-spacing:.18em;color:rgba(229,229,229,.55);text-transform:uppercase}
.input-actions{display:flex;gap:8px}
.btn-mini{background:transparent;border:1px solid rgba(255,255,255,.22);color:#fff;font-family:var(--font-sans);font-size:11px;padding:4px 10px;letter-spacing:.06em;cursor:pointer;transition:all .15s}
.btn-mini:hover{background:rgba(255,255,255,.08)}
textarea{flex:1;width:100%;border:0;background:transparent;color:#dcd0a8;font-family:"SF Mono",Monaco,Menlo,monospace;font-size:12px;line-height:1.55;padding:14px 16px;resize:vertical;outline:none;min-height:480px}
textarea::placeholder{color:rgba(220,208,168,.35)}

/* Preview */
.preview-wrap{background:#fff;border:1px solid var(--border);position:relative;min-height:560px;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:20px}
.preview-empty{font-family:var(--font-serif);font-size:14px;color:var(--muted);padding:40px;text-align:center;max-width:30ch;line-height:1.7}
.preview-shell{position:relative;overflow:hidden;display:none}
#previewFrame{width:1080px;height:1080px;border:0;transform-origin:top left;display:block;background:#e5e5e5}

/* Actions */
.actions{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-top:6px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 18px;font-family:var(--font-serif);font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;border:0;transition:all .2s}
.btn-primary{background:var(--ink);color:#fff}
.btn-primary:hover{background:var(--seal)}
.btn-ghost{background:transparent;color:var(--ink);border:1px solid var(--ink)}
.btn-ghost:hover{background:var(--ink);color:#fff}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn .arrow{transition:transform .2s}
.btn-primary:hover .arrow{transform:translateY(2px)}

.msg{font-size:12.5px;color:var(--muted);font-style:italic;flex:1;min-width:120px;text-align:right}
.msg.error{color:var(--seal);font-style:normal}

.note{padding:14px 16px;background:#fff;border-left:3px solid var(--dark);font-size:12.5px;color:var(--muted);line-height:1.6;margin-top:14px}
.note code{font-family:"SF Mono",Monaco,monospace;background:rgba(0,0,0,.05);padding:1px 5px;font-size:11.5px}
.note strong{color:var(--ink);font-weight:500}

.footer{padding:32px 0;border-top:1px solid var(--border);font-size:12.5px;color:var(--muted);margin-top:auto}
.footer-inner{display:flex;justify-content:space-between;flex-wrap:wrap;gap:14px}
.footer a{color:var(--dark);border-bottom:1px solid var(--border);padding-bottom:1px}
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-inner">
    <a href="./" class="brand"><span class="dot"></span>司马迁.skill</a>
    <a href="./" class="back">← 返回入口</a>
  </div>
</nav>

<header class="head">
  <div class="wrap">
    <div class="eyebrow">RENDERER · 渲染器</div>
    <h1>把 HTML 粘进来，下载干净的 PNG</h1>
    <p class="lead">解决手机截图有白边的问题。导出为精确 1080×1080，可直接发朋友圈。</p>
  </div>
</header>

<main class="wrap">
  <div class="layout">
    <div class="col">
      <h2>① 粘 HTML</h2>
      <div class="input-wrap">
        <div class="input-bar">
          <span>HTML INPUT</span>
          <div class="input-actions">
            <button class="btn-mini" id="pasteBtn" type="button">粘贴</button>
            <button class="btn-mini" id="clearBtn" type="button">清空</button>
          </div>
        </div>
        <textarea id="htmlInput" spellcheck="false" placeholder="粘进 AI 返回的整段 HTML，从 &lt;!DOCTYPE html&gt; 到 &lt;/html&gt;。

如果 AI 用 ```html ... ``` 包了，连反引号一起粘也没关系——自动会清。

粘完会自动渲染。"></textarea>
      </div>
      <div class="actions">
        <button class="btn btn-ghost" id="renderBtn" type="button">渲染预览</button>
        <button class="btn btn-primary" id="downloadBtn" type="button" disabled>下载 PNG<span class="arrow">↓</span></button>
        <span class="msg" id="msg">粘 HTML 后会自动渲染</span>
      </div>
      <div class="note">
        预览框里看到完整卡片后，点<strong>下载 PNG</strong>。生成的图是精确 <code>1080×1080</code>，retina 2x 清晰度，无白边、无浏览器装饰。<br>
        手机直接发朋友圈、小红书都可以。
      </div>
    </div>

    <div class="col">
      <h2>② 预览</h2>
      <div class="preview-wrap" id="previewWrap">
        <div class="preview-empty" id="previewEmpty">
          列传未至。<br>
          <span style="font-size:12px;letter-spacing:.06em;color:#888">粘 HTML 后会自动出现在这里</span>
        </div>
        <div class="preview-shell" id="previewShell">
          <iframe id="previewFrame" sandbox="allow-same-origin allow-scripts"></iframe>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="wrap footer-inner">
    <span>司马迁.skill · 渲染器 · v0.1</span>
    <span><a href="./">返回入口</a> · <a href="https://github.com/ShaohuaDavidLee/simaqian" target="_blank">GitHub</a></span>
  </div>
</footer>

<script>
const $ = id => document.getElementById(id);
const input = $('htmlInput');
const renderBtn = $('renderBtn');
const downloadBtn = $('downloadBtn');
const msg = $('msg');
const previewEmpty = $('previewEmpty');
const previewShell = $('previewShell');
const previewFrame = $('previewFrame');
const previewWrap = $('previewWrap');

function setMsg(text, isError){
  msg.textContent = text;
  msg.classList.toggle('error', !!isError);
}

function stripFences(s){
  s = s.trim();
  s = s.replace(/^```(?:html|HTML)?\s*\n?/, '');
  s = s.replace(/\n?```\s*$/, '');
  return s.trim();
}

function fitPreviewScale(){
  const r = previewWrap.getBoundingClientRect();
  const pad = 40;
  const availW = Math.max(220, r.width - pad);
  const availH = Math.max(220, r.height - pad);
  const scale = Math.min(availW / 1080, availH / 1080, 1);
  previewFrame.style.transform = 'scale(' + scale + ')';
  previewShell.style.width = (1080 * scale) + 'px';
  previewShell.style.height = (1080 * scale) + 'px';
}

const HTML2CANVAS_PATH = new URL('./html2canvas.min.js', location.href).href;

function render(){
  const raw = input.value.trim();
  if(!raw){ setMsg('请先粘 HTML', true); return; }
  const html = stripFences(raw);
  if(!/<html|<!DOCTYPE/i.test(html)){
    setMsg('看起来不是完整 HTML——确认从 <!DOCTYPE 开始', true);
    return;
  }
  // Inject html2canvas script into the HTML before writing
  const injected = html.replace(
    /<\/body>/i,
    '<script src="' + HTML2CANVAS_PATH + '"><\/script></body>'
  );
  const doc = previewFrame.contentDocument || previewFrame.contentWindow.document;
  doc.open();
  doc.write(injected);
  doc.close();
  previewEmpty.style.display = 'none';
  previewShell.style.display = 'block';
  setTimeout(()=>{
    fitPreviewScale();
    downloadBtn.disabled = false;
    setMsg('渲染完成。点"下载 PNG"导出');
  }, 200);
}

async function waitFor(check, timeout){
  const start = Date.now();
  while(Date.now() - start < timeout){
    if(check()) return true;
    await new Promise(r=>setTimeout(r, 100));
  }
  return false;
}

async function download(){
  setMsg('正在生成 PNG…');
  downloadBtn.disabled = true;
  try{
    const iframeWin = previewFrame.contentWindow;
    const iframeDoc = previewFrame.contentDocument;

    // wait for html2canvas to load inside iframe
    const loaded = await waitFor(()=>iframeWin && iframeWin.html2canvas, 8000);
    if(!loaded){ throw new Error('html2canvas 加载超时'); }

    // wait for QR image to load
    const qrImg = iframeDoc.querySelector('.qr img');
    if(qrImg && !qrImg.complete){
      await waitFor(()=>qrImg.complete, 3000);
    }

    const card = iframeDoc.querySelector('.card') || iframeDoc.body;

    const canvas = await iframeWin.html2canvas(card, {
      width: 1080, height: 1080,
      windowWidth: 1080, windowHeight: 1080,
      scale: 2,
      backgroundColor: '#e5e5e5',
      useCORS: true,
      allowTaint: false,
      logging: false
    });

    canvas.toBlob(blob => {
      if(!blob){ setMsg('生成失败：浏览器返回空数据', true); return; }
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      const t = new Date();
      const stamp = t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
      a.download = 'lieZhuan-' + stamp + '.png';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url), 1500);
      setMsg('PNG 已下载 ✓');
    }, 'image/png');
  }catch(e){
    console.error(e);
    setMsg('生成失败：' + (e.message || e), true);
  }finally{
    downloadBtn.disabled = false;
  }
}

renderBtn.addEventListener('click', render);
downloadBtn.addEventListener('click', download);
$('clearBtn').addEventListener('click', ()=>{
  input.value = '';
  setMsg('已清空');
  downloadBtn.disabled = true;
  previewShell.style.display = 'none';
  previewEmpty.style.display = 'flex';
});
$('pasteBtn').addEventListener('click', async ()=>{
  try{
    const text = await navigator.clipboard.readText();
    if(text){ input.value = text; render(); }
  }catch(e){
    setMsg('浏览器不允许直接读剪贴板，请在编辑框里手动 Ctrl/Cmd+V', true);
    input.focus();
  }
});

// Auto-render on paste
input.addEventListener('paste', ()=>{
  setTimeout(()=>{
    if(input.value.trim() && (/<!DOCTYPE|<html/i).test(input.value)){ render(); }
  }, 80);
});

window.addEventListener('resize', ()=>{
  if(previewShell.style.display !== 'none') fitPreviewScale();
});
</script>

</body>
</html>
